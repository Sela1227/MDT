<!DOCTYPE html>
<!--
  錄音切割台 — 會議錄音切割工具（給 Gemini 逐字稿用）
  功能：固定時長自動分段 / 手動單段 / 手動多段標記 / 16 kHz MP3 匯出 / 時間對照表
  適用：Chrome、Edge、Safari 等現代瀏覽器；純前端單檔，音檔全程留在本機不上傳
  版號：見 <script> 內 VERSION 常數 —— 標題列與 <title> 都由它寫入，不另外寫死
-->

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>錄音切割台</title>
<link id="favicon" rel="icon" type="image/svg+xml" href="data:,">
<meta name="theme-color" content="#F36825">
<style>
    :root {
        /* SELA 品牌色 —— 只給 logo 用，不進 UI */
        --sela-orange: #F36825;

        /* 北歐霧藍主題（conventions/colors.md：醫療系統 / 工具類預設） */
        --primary:      #5A7A8B;
        --secondary:    #9AB0BC;
        --danger:       #9A8585;
        --ok:           #4A9B7F;
        --muted:        #8A9BA8;
        --bg:           #FAFBFC;
        --text:         #4A5B6A;
        --bg-card:      #EEF2F5;
        --bg-button:    #E8EDF1;
        --border:       #D8DFE5;

        --font-sans: system-ui, -apple-system, "Microsoft JhengHei",
            "PingFang TC", "Noto Sans CJK TC", "Segoe UI", sans-serif;
        --font-mono: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 14px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
    }

    button, input, select { font-family: inherit; font-size: inherit; color: inherit; }

    .wrap { max-width: 1180px; margin: 0 auto; padding: 20px 18px 64px; }

    /* === 標題列 === */
    header {
        display: flex; align-items: center; gap: 12px;
        padding-bottom: 12px; margin-bottom: 18px;
        border-bottom: 2px solid var(--primary);
    }
    header svg { width: 34px; height: 34px; border-radius: 5px; flex-shrink: 0; }
    header h1 { margin: 0; font-size: 19px; font-weight: 600; color: var(--primary); }
    .ver {
        font-family: var(--font-mono); font-size: 12px; color: var(--muted);
        padding: 2px 8px; background: var(--bg-card); border-radius: 3px;
    }
    .tagline { font-size: 12px; color: var(--muted); }
    .spacer { flex: 1; }

    /* === 載入區 === */
    .drop {
        border: 2px dashed var(--secondary); background: var(--bg-card);
        padding: 42px 24px; text-align: center; cursor: pointer;
        border-radius: 6px; transition: background .15s, border-color .15s;
    }
    .drop.hot { background: var(--bg-button); border-color: var(--primary); }
    .drop b { display: block; font-size: 16px; margin-bottom: 6px; color: var(--text); }
    .drop small { color: var(--muted); font-family: var(--font-mono); font-size: 11px; }
    .modes {
        display: flex; gap: 26px; justify-content: center; flex-wrap: wrap;
        margin-top: 14px; padding: 12px; font-size: 13px;
    }
    .modes em {
        display: block; font-style: normal; font-size: 11px;
        color: var(--muted); font-family: var(--font-mono); padding-left: 20px;
    }

    /* === 面板 === */
    .panel {
        background: #fff; border: 1px solid var(--border);
        border-radius: 6px; margin-bottom: 16px; overflow: hidden;
    }
    .panel > h2 {
        margin: 0; padding: 9px 14px;
        font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
        font-family: var(--font-mono); font-weight: 600;
        background: var(--primary); color: #fff;
    }
    .panel .body { padding: 14px; }

    .meta {
        display: flex; gap: 24px; flex-wrap: wrap; align-items: baseline;
        padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--bg-card);
    }
    .meta .fname-main {
        font-weight: 600; max-width: 34ch;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .meta dl { display: flex; gap: 6px; margin: 0; align-items: baseline; }
    .meta dt {
        font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em;
        color: var(--muted); text-transform: uppercase;
    }
    .meta dd { margin: 0; font-family: var(--font-mono); font-size: 13px; }

    /* === 波形 === */
    .stage { background: #fff; }
    canvas { display: block; width: 100%; }
    #overview { height: 44px; cursor: pointer; border-bottom: 1px solid var(--border); }
    #wave { height: 210px; cursor: crosshair; }
    #ruler { height: 22px; }
    .transport {
        display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
        padding: 8px 14px; border-top: 1px solid var(--border); background: var(--bg-card);
    }
    .clock { font-family: var(--font-mono); font-size: 15px; font-variant-numeric: tabular-nums; }
    .clock .dim { color: var(--muted); }

    /* === 按鈕 === */
    button {
        border: 1px solid var(--secondary); background: var(--bg-button); color: var(--text);
        padding: 5px 12px; border-radius: 4px; cursor: pointer;
        transition: background .12s, color .12s, border-color .12s;
    }
    button:hover:not(:disabled) { background: var(--secondary); color: #fff; }
    button:active:not(:disabled) { transform: translateY(1px); }
    button:disabled { opacity: .38; cursor: not-allowed; }
    button:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    button.primary { background: var(--primary); color: #fff; border-color: var(--primary); font-weight: 600; }
    button.primary:hover:not(:disabled) { background: var(--text); border-color: var(--text); }
    button.tiny { padding: 3px 8px; font-size: 12px; }
    .icon { font-family: var(--font-mono); min-width: 34px; text-align: center; }

    /* === 模式選擇 === */
    .segmodes {
        display: flex; gap: 0; flex-wrap: wrap;
        border: 1px solid var(--secondary); border-radius: 4px; overflow: hidden;
        margin-bottom: 16px; width: fit-content;
    }
    .segmodes label {
        padding: 7px 16px; cursor: pointer; font-size: 13px;
        border-right: 1px solid var(--secondary); background: var(--bg-button);
        transition: background .12s, color .12s;
    }
    .segmodes label:last-child { border-right: 0; }
    .segmodes label:hover { background: var(--bg-card); }
    .segmodes input { position: absolute; opacity: 0; pointer-events: none; }
    .segmodes label.on { background: var(--primary); color: #fff; font-weight: 600; }

    /* === 表單 === */
    .row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 12px; }
    .row:last-child { margin-bottom: 0; }
    label.f { display: flex; flex-direction: column; gap: 3px; font-size: 12px; color: var(--muted); }
    label.f span {
        font-family: var(--font-mono); font-size: 10px;
        letter-spacing: .08em; text-transform: uppercase;
    }
    label.chk { display: flex; align-items: center; gap: 6px; font-size: 13px; padding-bottom: 6px; }
    input[type=number], input[type=text], select {
        border: 1px solid var(--border); background: #fff; color: var(--text);
        padding: 5px 8px; border-radius: 4px;
        font-family: var(--font-mono); font-variant-numeric: tabular-nums;
    }
    input[type=number] { width: 84px; }
    input[type=range] { width: 160px; accent-color: var(--primary); }
    input:focus-visible, select:focus-visible { outline: 2px solid var(--primary); outline-offset: 1px; }
    .hint { font-size: 12px; color: var(--muted); margin: 0 0 12px; }
    .val {
        font-family: var(--font-mono); font-variant-numeric: tabular-nums;
        display: inline-block; padding-bottom: 6px;
    }
    fieldset { border: 1px solid var(--border); border-radius: 4px; margin: 16px 0 0; padding: 10px 12px 12px; }
    legend {
        font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em;
        text-transform: uppercase; color: var(--muted); padding: 0 4px;
    }

    /* 時分秒輸入組 —— 錄音不到一小時時隱藏「時」欄，減少誤填 */
    .tgrp { display: flex; align-items: baseline; gap: 3px; }
    .tgrp input { width: 56px; text-align: right; }
    .tgrp input.sec { width: 68px; }
    .tgrp b { font-weight: 400; font-size: 11px; color: var(--muted); padding: 0 2px 0 1px; }
    .tgrp.nohour .hourpart { display: none; }

    /* === 相容性檢查條 === */
    .check {
        display: flex; gap: 18px; flex-wrap: wrap;
        border: 1px solid var(--border); border-left: 4px solid var(--ok);
        background: var(--bg-card); border-radius: 4px;
        padding: 9px 12px; margin-top: 12px;
        font-family: var(--font-mono); font-size: 12px;
    }
    .check.bad { border-left-color: var(--danger); }
    .check i { font-style: normal; }
    .check .ok { color: var(--ok); font-weight: 600; }
    .check .no { color: var(--danger); font-weight: 600; }

    /* === 表格 === */
    table {
        border-collapse: collapse; width: 100%; margin-top: 12px;
        font-family: var(--font-mono); font-size: 12px;
    }
    th, td {
        border-bottom: 1px solid var(--border); padding: 5px 8px;
        text-align: left; font-variant-numeric: tabular-nums;
    }
    th {
        font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
        color: var(--muted); border-bottom: 1px solid var(--secondary);
    }
    td:last-child, th:last-child { text-align: right; }
    tr.over td { color: var(--danger); }
    tr.over td:first-child::after { content: " ⚠"; }
    td.fname { color: var(--primary); max-width: 22ch; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    td input.lbl {
        width: 100%; border: 1px solid var(--border); border-radius: 3px;
        padding: 3px 6px; font-size: 12px;
    }
    .scroll { max-height: 320px; overflow: auto; }

    /* === 訊息與進度 === */
    #log {
        font-family: var(--font-mono); font-size: 11px; color: var(--muted);
        white-space: pre-wrap; max-height: 92px; overflow: auto;
        padding: 10px 14px; border-top: 1px solid var(--border);
    }
    .busy {
        position: fixed; inset: 0; z-index: 50;
        background: rgba(250, 251, 252, .9);
        display: none; align-items: center; justify-content: center;
        flex-direction: column; gap: 12px;
    }
    .busy.on { display: flex; }
    .busy p { font-family: var(--font-mono); font-size: 12px; margin: 0; color: var(--text); }
    .busy .bar { width: 280px; height: 6px; border: 1px solid var(--secondary); border-radius: 3px; background: #fff; }
    .busy .bar i { display: block; height: 100%; background: var(--primary); width: 0; }

    .hide { display: none !important; }
    kbd {
        font-family: var(--font-mono); font-size: 11px;
        border: 1px solid var(--border); border-radius: 3px;
        background: #fff; padding: 1px 5px;
    }
    .big { font-family: var(--font-mono); font-size: 12px; color: var(--primary); padding-bottom: 6px; }

    @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>

        <h1>錄音切割台</h1>
        <span class="ver" id="verLabel">—</span>
        <span class="tagline">音檔不離開這台電腦</span>
        <span class="spacer"></span>
        <button id="btnNew" class="hide" data-action="reset">換一個檔案</button>
    </header>

    <section id="loader">
        <div class="drop" id="drop" data-action="pick-file">
            <b>把錄音檔拖進來，或點這裡選檔</b>
            <small>MP3 · WAV · M4A · OGG · WEBM</small>
        </div>
        <div class="modes">
            <label><input type="radio" name="mode" value="asr" checked> 逐字稿用
                <em>16 kHz 單聲道，兩小時也不吃記憶體</em></label>
            <label><input type="radio" name="mode" value="hifi"> 保留高取樣率
                <em>依裝置，通常 48 kHz</em></label>
        </div>
        <input type="file" id="file" accept="audio/*" class="hide">
    </section>

    <section id="work" class="hide">

        <div class="panel">
            <div class="meta">
                <span class="fname-main" id="mName">—</span>
                <dl><dt>長度</dt><dd id="mDur">—</dd></dl>
                <dl><dt>取樣率</dt><dd id="mRate">—</dd></dl>
            </div>
            <div class="stage">
                <canvas id="overview"></canvas>
                <canvas id="wave"></canvas>
                <canvas id="ruler"></canvas>
            </div>
            <div class="transport">
                <button class="icon" id="btnPlay" data-action="play-toggle" title="空白鍵">▶</button>
                <button class="icon" data-action="play-rewind" title="回開頭">■</button>
                <span class="clock"><span id="tNow">00:00:00.0</span>
                    <span class="dim">/ <span id="tAll">—</span></span></span>
                <label class="f" style="padding-left:8px"><span>速度</span>
                    <select id="rate" data-change="rate">
                        <option value="1">1.0×</option>
                        <option value="1.25">1.25×</option>
                        <option value="1.5">1.5×</option>
                        <option value="2" selected>2.0×</option>
                        <option value="2.5">2.5×</option>
                        <option value="3">3.0×</option>
                    </select></label>
                <label class="chk"><input type="checkbox" id="skipSil"> 跳過安靜段</label>
                <span class="spacer"></span>
                <button class="icon" data-action="zoom-in" title="放大">＋</button>
                <button class="icon" data-action="zoom-out" title="縮小">－</button>
                <button data-action="zoom-fit">全覽</button>
            </div>
            <div id="log"></div>
        </div>

        <div class="panel">
            <h2>分段</h2>
            <div class="body">

                <div class="segmodes" id="segModes">
                    <label class="on"><input type="radio" name="segmode" value="auto" checked
                        data-change="seg-mode"> 自動 · 固定時長</label>
                    <label><input type="radio" name="segmode" value="single"
                        data-change="seg-mode"> 手動 · 單一段</label>
                    <label><input type="radio" name="segmode" value="multi"
                        data-change="seg-mode"> 手動 · 多段</label>
                </div>

                <!-- 自動 -->
                <div id="modeAuto">
                    <div class="row">
                        <label class="f"><span>每段長度</span>
                            <input type="number" id="segMin" value="15" step="1" min="0"></label>
                        <span class="val">分</span>
                        <label class="f"><span>&nbsp;</span>
                            <input type="number" id="segSec" value="0" step="5" min="0" max="59"></label>
                        <span class="val">秒</span>
                        <label class="f"><span>尾段太短時</span>
                            <select id="tailMode">
                                <option value="merge">併入前一段</option>
                                <option value="keep">獨立成一段</option>
                            </select></label>
                        <button class="primary" data-action="plan-auto">產生分段</button>
                        <button class="tiny" data-action="preset" data-min="15" data-plan="pro">AI Pro 15 分</button>
                        <button class="tiny" data-action="preset" data-min="9" data-plan="free">免費版 9 分</button>
                    </div>
                    <p class="hint">切點會在目標時間附近挪到最近的停頓，避免切在句子中間。</p>
                </div>

                <!-- 手動單段 -->
                <div id="modeSingle" class="hide">
                    <div class="row">
                        <label class="f"><span>起點</span>
                            <span class="tgrp" id="tgA">
                                <span class="hourpart"><input type="number" id="aH" min="0" value="0" data-change="sel-time"><b>時</b></span>
                                <input type="number" id="aM" min="0" value="0" data-change="sel-time"><b>分</b>
                                <input type="number" id="aS" class="sec" min="0" step="0.1" value="0" data-change="sel-time"><b>秒</b>
                            </span></label>
                        <button class="tiny" data-action="set-sel-start">設為起點</button>
                        <label class="f"><span>終點</span>
                            <span class="tgrp" id="tgB">
                                <span class="hourpart"><input type="number" id="bH" min="0" value="0" data-change="sel-time"><b>時</b></span>
                                <input type="number" id="bM" min="0" value="0" data-change="sel-time"><b>分</b>
                                <input type="number" id="bS" class="sec" min="0" step="0.1" value="0" data-change="sel-time"><b>秒</b>
                            </span></label>
                        <button class="tiny" data-action="set-sel-end">設為終點</button>
                        <label class="f"><span>長度</span>
                            <input type="text" id="selLen" value="—" readonly style="width:96px"></label>
                    </div>
                    <div class="row">
                        <button data-action="play-selection">播放選取</button>
                        <button data-action="zoom-selection">放大到選取</button>
                        <button data-action="clear-selection">清除選取</button>
                    </div>
                    <p class="hint">也可以直接在波形上拖曳選取。<kbd>[</kbd> 設起點、<kbd>]</kbd> 設終點。</p>
                </div>

                <!-- 手動多段 -->
                <div id="modeMulti" class="hide">
                    <div class="row">
                        <button class="primary" data-action="mark-here">＋ 在目前位置加切點</button>
                        <button data-action="clear-marks">清除所有切點</button>
                        <span class="big" id="markCount">尚未設定切點</span>
                    </div>
                    <p class="hint">播放時在每個案例交接處按 <kbd>M</kbd> 加切點，切完一次全部匯出。
                        建議開 2× 並勾「跳過安靜段」，掃一場會議快很多。</p>
                </div>

                <fieldset>
                    <legend>共用設定</legend>
                    <div class="row">
                        <label class="f"><span>安靜門檻</span>
                            <input type="range" id="thr" min="-70" max="-25" step="1" value="-45" data-change="threshold"></label>
                        <span class="val" id="thrV">-45 dB</span>
                        <label class="chk"><input type="checkbox" id="trimEnds" checked data-change="trim-ends">
                            略過開頭與結尾的空白</label>
                    </div>
                </fieldset>
            </div>
        </div>

        <div class="panel">
            <h2>輸出</h2>
            <div class="body">
                <div class="row">
                    <label class="f"><span>檔名前綴</span>
                        <input type="text" id="prefix" style="width:190px" data-change="refresh-names"></label>
                    <label class="f"><span>格式</span>
                        <select id="fmt" data-change="refresh-names">
                            <option value="mp3-64">MP3 64k（Gemini 建議）</option>
                            <option value="mp3-128">MP3 128k</option>
                            <option value="wav">WAV 16-bit</option>
                        </select></label>
                    <label class="f"><span>Gemini 方案</span>
                        <select id="plan" data-change="refresh-names">
                            <option value="free">免費（總長 10 分）</option>
                            <option value="pro">AI Pro / Ultra（總長 3 小時）</option>
                        </select></label>
                    <label class="chk"><input type="checkbox" id="normOn" checked> 音量正規化</label>
                </div>
                <div id="checkStrip"></div>
                <div class="row" style="margin-top:12px">
                    <button class="primary" id="btnExportAll" data-action="export-all" disabled>全部匯出</button>
                    <button id="btnManifest" data-action="export-manifest" disabled>下載對照表 + 提示詞</button>
                </div>
                <div class="scroll"><table id="segTable" class="hide">
                    <thead><tr><th>#</th><th>段落名稱</th><th>檔名</th><th>起</th><th>迄</th>
                        <th>長度</th><th>大小</th><th></th></tr></thead>
                    <tbody></tbody></table></div>
            </div>
        </div>
    </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.0/lame.min.js"></script>
<script>
(function () {
"use strict";

/* === 版本與常數 === */

const VERSION = "V3.3.0";

const ASR_SAMPLE_RATE   = 16000;   // 逐字稿模式的解碼取樣率；語音辨識模型的原生規格，再高沒幫助
const FRAME_SEC         = 0.02;    // 音量分析視窗（20 ms），語音包絡的常用解析度
const FADE_SEC          = 0.005;   // 切點淡入淡出；波形非零處硬切會有爆音
const NORM_TARGET_DB    = -14;     // 正規化目標（對 90 百分位音量）
const NORM_GAIN_MIN     = 0.5;     // -6 dB
const NORM_GAIN_MAX     = 16;      // +24 dB，避免把純噪音底放大到荒謬
const NORM_KNEE         = 0.8;     // 軟膝限幅起點
const NORM_PERCENTILE   = 0.9;     // 用百分位而非峰值：會議室的峰值通常是敲桌子，不是人聲
const SKIP_MIN_SILENCE  = 1.0;     // 「跳過安靜段」的最短停頓
const ALIGN_MIN_SILENCE = 0.6;     // 自動分段時可用來對齊的最短停頓
const ALIGN_WINDOW_SEC  = 30;      // 切點可從目標時間挪動的範圍
const PEAK_SUBSAMPLE    = 2000;    // 波形取峰值時每像素最多掃幾點，長檔用來保持順暢
const DOWNLOAD_GAP_MS   = 350;     // 連續下載的間隔，太快瀏覽器會擋
const GEMINI_FILE_LIMIT = 100 * 1048576;
const GEMINI_PLAN = {
    free: { sec: 10 * 60,  name: "免費版", txt: "10 分" },
    pro:  { sec: 180 * 60, name: "AI Pro", txt: "3 小時" }
};
const MP3_KBPS = { "mp3-64": 64, "mp3-128": 128 };

/* === 執行期狀態 === */

let audioCtx = null;

const state = {
    buf: null,              // 解碼後的 AudioBuffer（分析與匯出的唯一資料源）
    name: "recording",
    loadMode: "asr",        // 載入時的取樣率模式
    segMode: "auto",        // 分段模式：auto / single / multi
    objectUrl: null,        // 給 <audio> 播放用；跟 buf 是同一份音訊的兩種形式
    ready: false,
    viewStart: 0,
    viewDur: 0,
    selStart: null,
    selEnd: null,
    frames: null,           // { rms, win, sampleRate, count } 全檔音量包絡，只算一次
    markers: [],            // 手動多段模式的切點
    segments: [],           // 三種模式最後都收斂成這份清單
    skipRuns: null,
    skipKey: "",
    playStop: null,
    rafId: 0,
    waveCache: { key: "", min: null, max: null },
    overviewCache: { key: "", min: null, max: null }
};

const $ = sel => document.querySelector(sel);
const $$ = sel => Array.from(document.querySelectorAll(sel));
const player = $("#player");

/* === 共用小工具 === */

function logLine(msg) {
    const el = $("#log");
    const stamp = new Date().toTimeString().slice(0, 8);
    el.textContent += (el.textContent ? "\n" : "") + stamp + "  " + msg;
    el.scrollTop = el.scrollHeight;
}

function fmtTime(sec, withDecimal) {
    if (!isFinite(sec)) return "—";
    sec = Math.max(0, sec);
    const h = Math.floor(sec / 3600);
    const m = Math.floor(sec % 3600 / 60);
    const s = Math.floor(sec % 60);
    const pad = n => String(n).padStart(2, "0");
    const base = pad(h) + ":" + pad(m) + ":" + pad(s);
    return withDecimal ? base + "." + String(Math.floor((sec - Math.floor(sec)) * 10)) : base;
}

function fmtShort(sec) {
    return Math.floor(sec / 60) + ":" + String(Math.floor(sec % 60)).padStart(2, "0");
}

function fmtBytes(n) {
    return n < 1048576 ? (n / 1024).toFixed(0) + " KB" : (n / 1048576).toFixed(1) + " MB";
}

function setBusy(on, msg) {
    $("#busy").classList.toggle("on", !!on);
    if (msg) $("#busyMsg").textContent = msg;
    if (!on) $("#busyBar").style.width = "0%";
}

function setProgress(ratio) {
    $("#busyBar").style.width = Math.round(ratio * 100) + "%";
}

// 讓瀏覽器有機會重繪進度條；長迴圈中定期 await 這個
const yieldToUI = () => new Promise(resolve => setTimeout(resolve, 0));

function currentFormat() {
    const v = $("#fmt").value;
    if (v === "wav" || !window.lamejs) return { ext: "wav", kbps: 0 };
    return { ext: "mp3", kbps: MP3_KBPS[v] };
}

function estimateBytes(sec) {
    const fmt = currentFormat();
    if (fmt.ext === "mp3") return sec * fmt.kbps * 125;
    const b = state.buf;
    return sec * (b ? b.sampleRate : ASR_SAMPLE_RATE) * 2 * (b ? b.numberOfChannels : 1) + 44;
}

function planCap() {
    return GEMINI_PLAN[$("#plan").value];
}

function thresholdDb() {
    return parseFloat($("#thr").value);
}

function clampTime(t) {
    return Math.min(Math.max(0, t), state.buf.duration);
}

/* === 品牌與版號 === */
// 版號只有 VERSION 一個來源：標題列、<title> 都從它取，避免多處各寫一份而不同步

function applyBranding() {
    $("#verLabel").textContent = VERSION;
    document.title = "錄音切割台 " + VERSION;
    const logo = $("#selaLogo");
    if (logo) {
        const svg = new XMLSerializer().serializeToString(logo);
        $("#favicon").href = "data:image/svg+xml;utf8," + encodeURIComponent(svg);
    }
}

/* === 檔案載入 === */

async function ensureAudioContext(rate) {
    const Ctor = window.AudioContext || window.webkitAudioContext;
    // 取樣率是建立時就固定的，換模式必須整個重建
    if (audioCtx && rate && Math.abs(audioCtx.sampleRate - rate) > 1) {
        try { await audioCtx.close(); } catch (e) { /* 已關閉就算了 */ }
        audioCtx = null;
    }
    if (!audioCtx) {
        try { audioCtx = rate ? new Ctor({ sampleRate: rate }) : new Ctor(); }
        catch (e) { audioCtx = new Ctor(); }
    }
    return audioCtx;
}

function setPlayerSource(blob) {
    return new Promise(resolve => {
        if (state.objectUrl) URL.revokeObjectURL(state.objectUrl);
        state.objectUrl = URL.createObjectURL(blob);
        state.ready = false;
        const finish = ok => { state.ready = ok; resolve(ok); };
        player.onloadedmetadata = () => finish(true);
        player.onerror = () => {
            logLine("✗ 播放器讀不到這個格式，切割與匯出仍可用，但無法試聽。");
            finish(false);
        };
        player.src = state.objectUrl;
        player.load();
    });
}

async function loadFile(file) {
    try {
        state.loadMode = document.querySelector("input[name=mode]:checked").value;
        setBusy(true, "讀取檔案…");
        setProgress(0.08);

        const raw = await file.arrayBuffer();
        await ensureAudioContext(state.loadMode === "asr" ? ASR_SAMPLE_RATE : null);

        setBusy(true, "解碼音訊…（長檔要一下）");
        setProgress(0.3);
        await yieldToUI();

        let buffer = await audioCtx.decodeAudioData(raw);
        if (state.loadMode === "asr" && buffer.numberOfChannels > 1) {
            setBusy(true, "混成單聲道…");
            setProgress(0.6);
            await yieldToUI();
            buffer = downmixToMono(buffer);
        }

        state.buf = buffer;
        state.name = file.name.replace(/\.[^.]+$/, "") || "recording";
        state.selStart = state.selEnd = null;
        state.markers = [];
        state.segments = [];
        state.skipKey = "";
        state.waveCache.key = "";
        state.overviewCache.key = "";

        $("#prefix").value = state.name;
        $("#loader").classList.add("hide");
        $("#work").classList.remove("hide");
        $("#btnNew").classList.remove("hide");
        $("#segTable").classList.add("hide");
        $("#checkStrip").innerHTML = "";
        $("#btnExportAll").disabled = true;
        $("#btnManifest").disabled = true;

        setBusy(true, "準備播放器…");
        setProgress(0.75);
        await setPlayerSource(file);
        applyPlaybackRate();

        fitView();
        refreshMeta();
        clearSelection();
        redraw();
        logLine("✓ 已載入 " + file.name + "（" + fmtBytes(file.size) + "）");

        await analyzeLoudness(buffer);
        updateMarkerUI();
        setBusy(false);
    } catch (err) {
        setBusy(false);
        window.alert("這個檔案解不開：" + (err && err.message ? err.message : err) +
            "\n\n試試轉成 WAV 或 MP3 再進來。");
    }
}

function downmixToMono(b) {
    const out = audioCtx.createBuffer(1, b.length, b.sampleRate);
    const dst = out.getChannelData(0);
    const n = b.numberOfChannels;
    for (let c = 0; c < n; c++) {
        const src = b.getChannelData(c);
        for (let i = 0; i < b.length; i++) dst[i] += src[i] / n;
    }
    return out;
}

function refreshMeta() {
    const b = state.buf;
    $("#mName").textContent = state.name;
    $("#mDur").textContent = fmtTime(b.duration);
    $("#mRate").textContent = b.sampleRate + " Hz";
    $("#tAll").textContent = fmtTime(b.duration);
    const underOneHour = b.duration < 3600;
    $("#tgA").classList.toggle("nohour", underOneHour);
    $("#tgB").classList.toggle("nohour", underOneHour);
}

/* === 音量分析 === */
// 全檔只掃一次存成包絡，之後改門檻是純比大小、即時反應

async function analyzeLoudness(b) {
    setBusy(true, "分析音量…");
    setProgress(0);
    await yieldToUI();

    const sampleRate = b.sampleRate;
    const win = Math.max(64, Math.floor(sampleRate * FRAME_SEC));
    const count = Math.ceil(b.length / win);
    const rms = new Float32Array(count);
    const channels = [];
    for (let c = 0; c < b.numberOfChannels; c++) channels.push(b.getChannelData(c));

    for (let w = 0; w < count; w++) {
        const from = w * win;
        const to = Math.min(b.length, from + win);
        let sum = 0, n = 0;
        for (let c = 0; c < channels.length; c++) {
            const d = channels[c];
            for (let i = from; i < to; i++) { sum += d[i] * d[i]; n++; }
        }
        rms[w] = Math.sqrt(sum / Math.max(1, n));
        if ((w & 16383) === 0) { setProgress(w / count); await yieldToUI(); }
    }

    state.frames = { rms: rms, win: win, sampleRate: sampleRate, count: count };
    state.skipKey = "";
    logLine("✓ 音量分析完成");
}

function findSilenceRuns(thrDb, minSec) {
    if (!state.frames) return [];
    const f = state.frames;
    const thr = Math.pow(10, thrDb / 20);
    const runs = [];
    let start = -1;
    for (let w = 0; w <= f.count; w++) {
        const quiet = w < f.count && f.rms[w] <= thr;
        if (quiet && start < 0) start = w;
        if (!quiet && start >= 0) {
            const s = start * f.win / f.sampleRate;
            const e = w * f.win / f.sampleRate;
            if (e - s >= minSec) runs.push({ s: s, e: e, d: e - s });
            start = -1;
        }
    }
    return runs;
}

// 錄音筆常常會議前就開著、散會後還在錄，頭尾空白直接略過
function findSpeechBounds(thrDb) {
    const dur = state.buf.duration;
    if (!state.frames) return [0, dur];
    const f = state.frames;
    const thr = Math.pow(10, thrDb / 20);
    let a = 0, z = f.count - 1;
    while (a < f.count && f.rms[a] <= thr) a++;
    while (z > a && f.rms[z] <= thr) z--;
    if (a >= f.count) return [0, dur];
    return [Math.max(0, a * f.win / f.sampleRate - 2),
            Math.min(dur, (z + 1) * f.win / f.sampleRate + 2)];
}

/* === 波形繪製 === */

const cvWave = $("#wave");
const cvOverview = $("#overview");
const cvRuler = $("#ruler");

function setupCanvas(cv) {
    const dpr = window.devicePixelRatio || 1;
    const rect = cv.getBoundingClientRect();
    cv.width = Math.max(1, Math.floor(rect.width * dpr));
    cv.height = Math.max(1, Math.floor(rect.height * dpr));
    const g = cv.getContext("2d");
    g.setTransform(dpr, 0, 0, dpr, 0, 0);
    return { g: g, w: rect.width, h: rect.height };
}

// 峰值計算是全檔掃描，拖曳縮圖條時每次滑鼠移動都會重畫 —— 沒快取會明顯卡頓
function computePeaks(cache, b, from, to, width) {
    const key = [from.toFixed(4), to.toFixed(4), width, b.length].join("|");
    if (cache.key === key) return cache;

    const sampleRate = b.sampleRate;
    const i0 = Math.max(0, Math.floor(from * sampleRate));
    const i1 = Math.min(b.length, Math.ceil(to * sampleRate));
    const perPixel = (i1 - i0) / width;
    const lows = new Float32Array(width);
    const highs = new Float32Array(width);
    const channels = [];
    for (let c = 0; c < b.numberOfChannels; c++) channels.push(b.getChannelData(c));
    const step = Math.max(1, Math.floor(perPixel / PEAK_SUBSAMPLE));

    for (let x = 0; x < width; x++) {
        const a = i0 + Math.floor(x * perPixel);
        const z = Math.min(i1, i0 + Math.floor((x + 1) * perPixel));
        let lo = 0, hi = 0;
        for (let c = 0; c < channels.length; c++) {
            const d = channels[c];
            for (let i = a; i < z; i += step) {
                const v = d[i];
                if (v < lo) lo = v; else if (v > hi) hi = v;
            }
        }
        lows[x] = lo;
        highs[x] = hi;
    }
    cache.key = key;
    cache.min = lows;
    cache.max = highs;
    return cache;
}

const timeToX = (t, w) => (t - state.viewStart) / state.viewDur * w;
const xToTime = (x, w) => state.viewStart + x / w * state.viewDur;

function cssVar(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function drawWave() {
    const b = state.buf;
    if (!b) return;
    const canvas = setupCanvas(cvWave);
    const g = canvas.g, w = canvas.w, h = canvas.h;
    g.clearRect(0, 0, w, h);
    const mid = h / 2;

    // 被略過的頭尾
    if (state.segments.length) {
        g.fillStyle = "rgba(138,155,168,.16)";
        const first = state.segments[0];
        const last = state.segments[state.segments.length - 1];
        const xa = timeToX(0, w), xb = timeToX(first.s, w);
        if (xb > xa) g.fillRect(xa, 0, xb - xa, h);
        const xc = timeToX(last.e, w), xd = timeToX(b.duration, w);
        if (xd > xc) g.fillRect(xc, 0, xd - xc, h);
    }

    // 選取範圍
    if (state.selStart !== null && state.selEnd !== null && state.selEnd > state.selStart) {
        const x0 = timeToX(state.selStart, w), x1 = timeToX(state.selEnd, w);
        g.fillStyle = "rgba(90,122,139,.22)";
        g.fillRect(x0, 0, Math.max(1, x1 - x0), h);
    }

    g.strokeStyle = cssVar("--border");
    g.lineWidth = 1;
    g.beginPath();
    g.moveTo(0, mid + 0.5);
    g.lineTo(w, mid + 0.5);
    g.stroke();

    const peaks = computePeaks(state.waveCache, b, state.viewStart,
        state.viewStart + state.viewDur, Math.floor(w));
    g.strokeStyle = cssVar("--text");
    g.lineWidth = 1;
    g.beginPath();
    for (let x = 0; x < peaks.min.length; x++) {
        const y0 = mid - peaks.max[x] * (mid - 6);
        const y1 = mid - peaks.min[x] * (mid - 6);
        g.moveTo(x + 0.5, y0);
        g.lineTo(x + 0.5, Math.max(y1, y0 + 0.6));
    }
    g.stroke();

    drawCutLines(g, w, h);

    const px = timeToX(playhead(), w);
    if (px >= 0 && px <= w) {
        g.strokeStyle = cssVar("--danger");
        g.lineWidth = 1.5;
        g.beginPath();
        g.moveTo(px, 0);
        g.lineTo(px, h);
        g.stroke();
    }
}

function drawCutLines(g, w, h) {
    const primary = cssVar("--primary");
    const danger = cssVar("--danger");
    state.segments.forEach((seg, i) => {
        if (i === 0) return;
        const x = timeToX(seg.s, w);
        if (x < -20 || x > w + 20) return;
        const isHard = seg.align === "hard";
        g.strokeStyle = isHard ? danger : primary;
        g.lineWidth = 2;
        g.setLineDash(isHard ? [4, 3] : []);
        g.beginPath();
        g.moveTo(x + 0.5, 0);
        g.lineTo(x + 0.5, h);
        g.stroke();
        g.setLineDash([]);
        g.fillStyle = isHard ? danger : primary;
        g.fillRect(x + 1, 0, 22, 14);
        g.fillStyle = "#fff";
        g.font = "10px " + cssVar("--font-mono");
        g.fillText(String(i + 1).padStart(2, "0"), x + 5, 10);
    });
}

function drawRuler() {
    const canvas = setupCanvas(cvRuler);
    const g = canvas.g, w = canvas.w, h = canvas.h;
    g.clearRect(0, 0, w, h);
    g.fillStyle = cssVar("--bg-card");
    g.fillRect(0, 0, w, h);
    g.strokeStyle = cssVar("--secondary");
    g.lineWidth = 1;
    g.beginPath();
    g.moveTo(0, 0.5);
    g.lineTo(w, 0.5);
    g.stroke();

    // 選一個讓畫面上刻度不超過 12 個的級距
    const steps = [0.1, 0.25, 0.5, 1, 2, 5, 10, 15, 30, 60, 120, 300, 600, 900, 1800, 3600];
    let step = steps[steps.length - 1];
    for (let i = 0; i < steps.length; i++) {
        if (state.viewDur / steps[i] <= 12) { step = steps[i]; break; }
    }

    g.fillStyle = cssVar("--muted");
    g.font = "10px " + cssVar("--font-mono");
    for (let t = Math.ceil(state.viewStart / step) * step;
         t <= state.viewStart + state.viewDur; t += step) {
        const x = timeToX(t, w);
        g.strokeStyle = cssVar("--border");
        g.beginPath();
        g.moveTo(x + 0.5, 1);
        g.lineTo(x + 0.5, 7);
        g.stroke();
        g.fillText(fmtTime(t), x + 3, h - 6);
    }
}

function drawOverview() {
    const b = state.buf;
    if (!b) return;
    const canvas = setupCanvas(cvOverview);
    const g = canvas.g, w = canvas.w, h = canvas.h;
    g.clearRect(0, 0, w, h);
    g.fillStyle = "#fff";
    g.fillRect(0, 0, w, h);

    const dur = b.duration;
    const mid = h / 2;
    const peaks = computePeaks(state.overviewCache, b, 0, dur, Math.floor(w));
    g.strokeStyle = cssVar("--secondary");
    g.lineWidth = 1;
    g.beginPath();
    for (let x = 0; x < peaks.min.length; x++) {
        g.moveTo(x + 0.5, mid - peaks.max[x] * (mid - 3));
        g.lineTo(x + 0.5, mid - peaks.min[x] * (mid - 3));
    }
    g.stroke();

    state.segments.forEach((seg, i) => {
        if (i === 0) return;
        g.strokeStyle = seg.align === "hard" ? cssVar("--danger") : cssVar("--primary");
        g.lineWidth = 1;
        g.beginPath();
        const x = seg.s / dur * w;
        g.moveTo(x + 0.5, 0);
        g.lineTo(x + 0.5, h);
        g.stroke();
    });

    const x0 = state.viewStart / dur * w;
    const x1 = (state.viewStart + state.viewDur) / dur * w;
    g.fillStyle = "rgba(90,122,139,.20)";
    g.fillRect(x0, 0, Math.max(2, x1 - x0), h);
    g.strokeStyle = cssVar("--primary");
    g.lineWidth = 1;
    g.strokeRect(x0 + 0.5, 0.5, Math.max(2, x1 - x0) - 1, h - 1);
}

function redraw() {
    drawOverview();
    drawWave();
    drawRuler();
}

/* === 視野控制 === */

function fitView() {
    state.viewStart = 0;
    state.viewDur = state.buf.duration;
    state.waveCache.key = "";
}

function clampView() {
    const dur = state.buf.duration;
    state.viewDur = Math.min(dur, Math.max(0.05, state.viewDur));
    state.viewStart = Math.min(Math.max(0, state.viewStart), dur - state.viewDur);
}

function zoomView(factor, anchor) {
    const at = anchor === undefined ? state.viewStart + state.viewDur / 2 : anchor;
    const rel = (at - state.viewStart) / state.viewDur;
    state.viewDur *= factor;
    state.viewStart = at - rel * state.viewDur;
    clampView();
    redraw();
}

function centerView(t, span) {
    state.viewDur = Math.min(state.buf.duration, span || 60);
    state.viewStart = t - state.viewDur / 2;
    clampView();
    redraw();
}

/* === 播放控制 === */
// 用 <audio> 而不是 AudioBufferSourceNode：只有媒體元素有 preservesPitch，
// 變速掃描時聲音才不會變調成鴨子聲

function playhead() {
    return player.currentTime || 0;
}

function applyPlaybackRate() {
    player.playbackRate = parseFloat($("#rate").value);
    player.preservesPitch = true;
    player.webkitPreservesPitch = true;
    player.mozPreservesPitch = true;
}

function startPlay(from, until) {
    if (!state.ready) return;
    if (from !== undefined) {
        player.currentTime = Math.max(0, Math.min(from, state.buf.duration - 0.05));
    }
    state.playStop = until || null;
    applyPlaybackRate();
    player.play().catch(() => { /* 自動播放被擋就當沒事，使用者再按一次 */ });
    $("#btnPlay").textContent = "❚❚";
    window.cancelAnimationFrame(state.rafId);
    playbackTick();
}

function stopPlay() {
    player.pause();
    state.playStop = null;
    $("#btnPlay").textContent = "▶";
    window.cancelAnimationFrame(state.rafId);
    drawWave();
    updateClock();
}

function seekTo(t) {
    if (!state.ready) return;
    player.currentTime = Math.max(0, Math.min(t, state.buf.duration - 0.05));
    drawWave();
    updateClock();
}

function updateClock() {
    $("#tNow").textContent = fmtTime(playhead(), true);
}

function skipRunList() {
    const key = thresholdDb() + "|" + state.buf.duration;
    if (state.skipKey !== key) {
        state.skipRuns = findSilenceRuns(thresholdDb(), SKIP_MIN_SILENCE);
        state.skipKey = key;
    }
    return state.skipRuns;
}

// 停頓可能有上千段，每幀線性掃會拖慢畫面，所以用二分搜尋
function findRunAt(runs, t) {
    let lo = 0, hi = runs.length - 1;
    while (lo <= hi) {
        const mid = (lo + hi) >> 1;
        if (runs[mid].e <= t) lo = mid + 1;
        else if (runs[mid].s > t) hi = mid - 1;
        else return runs[mid];
    }
    return null;
}

function playbackTick() {
    const t = playhead();
    updateClock();

    if (state.playStop !== null && t >= state.playStop) { stopPlay(); return; }

    // 試聽片段（playStop 有值）時不跳，否則會跳出想聽的範圍
    if ($("#skipSil").checked && state.playStop === null) {
        const hit = findRunAt(skipRunList(), t);
        if (hit && t > hit.s + 0.4 && hit.e - t > 0.5) player.currentTime = hit.e - 0.15;
    }

    if (t < state.viewStart || t > state.viewStart + state.viewDur) {
        state.viewStart = t - state.viewDur * 0.15;
        clampView();
        drawOverview();
        drawRuler();
    }
    drawWave();
    if (!player.paused) state.rafId = window.requestAnimationFrame(playbackTick);
}

/* === 分段：三種模式都收斂成 state.segments === */

function switchSegMode(mode) {
    state.segMode = mode;
    $("#modeAuto").classList.toggle("hide", mode !== "auto");
    $("#modeSingle").classList.toggle("hide", mode !== "single");
    $("#modeMulti").classList.toggle("hide", mode !== "multi");
    $$("#segModes label").forEach(el => {
        el.classList.toggle("on", el.querySelector("input").value === mode);
    });

    // 換模式等於換一套切法，清掉上一種模式的結果免得混淆
    state.segments = [];
    if (mode === "single") planFromSelection();
    else if (mode === "multi") planFromMarkers();
    else afterPlanChanged();
}

// 重新規劃時盡量保住使用者已填的段落名稱（用索引對應，夠用）
function carryLabels(oldSegs, newSegs) {
    newSegs.forEach((s, i) => { s.label = (oldSegs[i] && oldSegs[i].label) || ""; });
    return newSegs;
}

function planAuto() {
    const b = state.buf;
    const len = Math.max(5,
        (parseFloat($("#segMin").value) || 0) * 60 + (parseFloat($("#segSec").value) || 0));
    const bounds = $("#trimEnds").checked ? findSpeechBounds(thresholdDb()) : [0, b.duration];
    const runs = findSilenceRuns(thresholdDb(), ALIGN_MIN_SILENCE);

    const segs = [];
    let cursor = bounds[0];
    let guard = 0;
    while (cursor < bounds[1] - 0.05 && guard++ < 5000) {
        const target = cursor + len;
        if (target >= bounds[1] - 0.05) {
            segs.push({ s: cursor, e: bounds[1], align: "end", label: "" });
            break;
        }
        // 在目標點附近挑「跟搜尋窗重疊最多」的停頓，切在重疊區中點
        let best = null;
        for (let i = 0; i < runs.length; i++) {
            const r = runs[i];
            const from = Math.max(r.s, target - ALIGN_WINDOW_SEC);
            const to = Math.min(r.e, target + ALIGN_WINDOW_SEC);
            if (to <= from) continue;
            const mid = (from + to) / 2;
            if (mid <= cursor + len * 0.4 || mid >= bounds[1]) continue;
            if (!best || (to - from) > best.score) best = { t: mid, score: to - from };
        }
        const cut = best ? best.t : target;
        segs.push({ s: cursor, e: cut, align: best ? "silence" : "hard", label: "" });
        cursor = cut;
    }

    if (segs.length > 1 && $("#tailMode").value === "merge") {
        const last = segs[segs.length - 1];
        if (last.e - last.s < len * 0.5) {
            segs[segs.length - 2].e = last.e;
            segs.pop();
        }
    }

    state.segments = carryLabels(state.segments, segs);
    afterPlanChanged();

    const hardCuts = segs.filter(s => s.align === "hard").length;
    logLine("✓ 分段 " + segs.length + " 段" +
        (hardCuts ? "，其中 " + hardCuts + " 個硬切" : "，全部對齊停頓"));
}

function planFromSelection() {
    if (state.selStart === null || state.selEnd === null || state.selEnd - state.selStart < 0.05) {
        state.segments = [];
    } else {
        const label = state.segments.length ? state.segments[0].label : "";
        state.segments = [{ s: state.selStart, e: state.selEnd, align: "manual", label: label || "" }];
    }
    afterPlanChanged();
}

function planFromMarkers() {
    const b = state.buf;
    const bounds = $("#trimEnds").checked ? findSpeechBounds(thresholdDb()) : [0, b.duration];
    const inner = state.markers
        .filter(m => m > bounds[0] + 1 && m < bounds[1] - 1)
        .sort((x, y) => x - y);
    const points = [bounds[0]].concat(inner, [bounds[1]]);

    const segs = [];
    for (let i = 0; i < points.length - 1; i++) {
        if (points[i + 1] - points[i] < 0.5) continue;
        segs.push({ s: points[i], e: points[i + 1], align: "marker", label: "" });
    }
    state.segments = carryLabels(state.segments, segs);
    afterPlanChanged();
}

function afterPlanChanged() {
    renderSegments();
    renderCompatibility();
    redraw();
    const hasSegments = state.segments.length > 0;
    $("#btnExportAll").disabled = !hasSegments;
    $("#btnManifest").disabled = !hasSegments;
}

function addMarker(t) {
    if (!state.buf || state.segMode !== "multi") return;
    if (state.markers.some(m => Math.abs(m - t) < 0.3)) return;
    state.markers.push(t);
    state.markers.sort((a, b) => a - b);
    planFromMarkers();
    updateMarkerUI();
    logLine("✓ 切點 " + fmtTime(t));
}

function removeMarker(t) {
    state.markers = state.markers.filter(m => Math.abs(m - t) >= 0.3);
    planFromMarkers();
    updateMarkerUI();
}

function updateMarkerUI() {
    $("#markCount").textContent = state.markers.length
        ? "已設 " + state.markers.length + " 個切點 → " + (state.markers.length + 1) + " 段"
        : "尚未設定切點";
}

/* === 分段清單與相容性 === */

function segmentName(i) {
    // 檔名不能含路徑分隔或保留字元，先濾掉
    const label = (state.segments[i].label || "").trim().replace(/[\\/:*?"<>|]/g, "");
    const prefix = $("#prefix").value;
    if (state.segMode === "single") return prefix + "_" + (label || "單段");
    const pad = Math.max(2, String(state.segments.length).length);
    return prefix + "_" + String(i + 1).padStart(pad, "0") + (label ? "_" + label : "");
}

function escapeHtml(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
function escapeAttr(s) {
    return escapeHtml(s).replace(/"/g, "&quot;");
}

function renderSegments() {
    if (!state.segments.length) {
        $("#segTable").classList.add("hide");
        return;
    }
    const tbody = $("#segTable tbody");
    tbody.innerHTML = "";
    const ext = currentFormat().ext;
    const cap = planCap();

    state.segments.forEach((seg, i) => {
        const dur = seg.e - seg.s;
        const full = segmentName(i) + "." + ext;
        const tr = document.createElement("tr");
        if (dur > cap.sec) tr.className = "over";
        tr.innerHTML =
            "<td>" + String(i + 1).padStart(2, "0") + "</td>" +
            '<td><input type="text" class="lbl" data-change="seg-label" data-idx="' + i +
                '" value="' + escapeAttr(seg.label || "") + '" placeholder="如 case03"></td>' +
            '<td class="fname" title="' + escapeAttr(full) + '">' + escapeHtml(full) + "</td>" +
            "<td>" + fmtTime(seg.s) + "</td>" +
            "<td>" + fmtTime(seg.e) + "</td>" +
            "<td>" + fmtShort(dur) + "</td>" +
            "<td>" + fmtBytes(estimateBytes(dur)) + "</td>" +
            "<td>" +
                (state.segMode === "multi" && i > 0
                    ? '<button class="tiny" data-action="seg-remove-cut" data-idx="' + i +
                      '" title="把這段併回上一段">− 併回上段</button>' : "") +
                '<button class="tiny" data-action="seg-audition" data-idx="' + i +
                    '" style="margin-left:6px">試聽開頭</button>' +
                '<button class="tiny" data-action="seg-export" data-idx="' + i +
                    '" style="margin-left:6px">匯出</button></td>';
        tbody.appendChild(tr);
    });
    $("#segTable").classList.remove("hide");
}

function renderCompatibility() {
    const el = $("#checkStrip");
    if (!state.segments.length) { el.innerHTML = ""; return; }

    const cap = planCap();
    const durations = state.segments.map(s => s.e - s.s);
    const count = state.segments.length;
    const maxSec = Math.max.apply(null, durations);
    const totalSec = durations.reduce((a, b) => a + b, 0);
    const maxBytes = estimateBytes(maxSec);

    // 一次只附一個檔的工作流下，關鍵是「單檔長度」而不是所有段落加總
    const lenOk = maxSec <= cap.sec;
    const sizeOk = maxBytes <= GEMINI_FILE_LIMIT;
    const perMessage = lenOk ? Math.max(1, Math.min(10, Math.floor(cap.sec / maxSec))) : 0;
    const mark = ok => ok ? '<i class="ok">✓</i>' : '<i class="no">✗</i>';

    el.innerHTML = '<div class="check' + (lenOk && sizeOk ? "" : " bad") + '">' +
        "<span>" + mark(lenOk) + " 最長一段 " + fmtShort(maxSec) + " / 單次上限 " + cap.txt + "</span>" +
        "<span>" + mark(sizeOk) + " 最大檔 " + fmtBytes(maxBytes) + " / 100 MB</span>" +
        "<span>共 " + count + " 段，總長 " + fmtTime(totalSec) + "</span>" +
        (lenOk
            ? '<span class="ok">→ 同一對話一次附 1 個檔，共 ' + count +
              " 則訊息（一次最多 " + perMessage + " 檔）</span>"
            : '<span class="no">→ 有段落超過' + cap.name + "單次上限</span>") +
        "</div>";
}

/* === 手動單段的選取 === */

function readTimeGroup(prefix) {
    return (parseFloat($("#" + prefix + "H").value) || 0) * 3600
         + (parseFloat($("#" + prefix + "M").value) || 0) * 60
         + (parseFloat($("#" + prefix + "S").value) || 0);
}

function writeTimeGroup(prefix, t) {
    t = Math.max(0, t);
    const h = Math.floor(t / 3600);
    const m = Math.floor((t % 3600) / 60);
    const s = t - h * 3600 - m * 60;
    $("#" + prefix + "H").value = h;
    $("#" + prefix + "M").value = m;
    $("#" + prefix + "S").value = (Math.round(s * 100) / 100).toFixed(2);
}

function setSelection(from, to) {
    state.selStart = from;
    state.selEnd = to;
    writeTimeGroup("a", from);
    writeTimeGroup("b", to);
    $("#selLen").value = fmtTime(to - from);
    if (state.segMode === "single") planFromSelection();
    else drawWave();
}

function clearSelection() {
    state.selStart = state.selEnd = null;
    writeTimeGroup("a", 0);
    writeTimeGroup("b", 0);
    $("#selLen").value = "—";
    if (state.segMode === "single") planFromSelection();
    else drawWave();
}

/* === 音訊處理 === */

function sliceBuffer(b, from, to) {
    const sampleRate = b.sampleRate;
    const a = Math.max(0, Math.floor(from * sampleRate));
    const z = Math.min(b.length, Math.ceil(to * sampleRate));
    const len = Math.max(1, z - a);
    const out = audioCtx.createBuffer(b.numberOfChannels, len, sampleRate);
    const fade = Math.min(Math.floor(sampleRate * FADE_SEC), Math.floor(len / 2));

    for (let c = 0; c < b.numberOfChannels; c++) {
        const dst = out.getChannelData(c);
        dst.set(b.getChannelData(c).subarray(a, z));
        for (let i = 0; i < fade; i++) {
            dst[i] *= i / fade;
            dst[len - 1 - i] *= i / fade;
        }
    }
    return out;
}

// 用 90 百分位而不是峰值當基準：會議室的峰值多半是敲桌子或咳嗽，
// 拿峰值正規化等於什麼都沒做，遠端發言者一樣小聲
function normalizeBuffer(buf) {
    const sampleRate = buf.sampleRate;
    const win = Math.max(64, Math.floor(sampleRate * FRAME_SEC));
    const count = Math.ceil(buf.length / win);
    if (count < 4) return buf;

    const channels = [];
    for (let c = 0; c < buf.numberOfChannels; c++) channels.push(buf.getChannelData(c));

    const levels = new Float32Array(count);
    for (let w = 0; w < count; w++) {
        const from = w * win;
        const to = Math.min(buf.length, from + win);
        let sum = 0, n = 0;
        for (let c = 0; c < channels.length; c++) {
            const d = channels[c];
            for (let i = from; i < to; i++) { sum += d[i] * d[i]; n++; }
        }
        levels[w] = Math.sqrt(sum / Math.max(1, n));
    }

    const sorted = levels.slice().sort();
    const reference = sorted[Math.min(count - 1, Math.floor(count * NORM_PERCENTILE))];
    if (!(reference > 1e-6)) return buf;

    const gain = Math.min(Math.max(Math.pow(10, NORM_TARGET_DB / 20) / reference,
        NORM_GAIN_MIN), NORM_GAIN_MAX);

    for (let c = 0; c < channels.length; c++) {
        const d = channels[c];
        for (let i = 0; i < d.length; i++) {
            let x = d[i] * gain;
            const mag = Math.abs(x);
            // 軟膝限幅：只壓超過門檻的瞬態，避免硬削造成失真
            if (mag > NORM_KNEE) {
                const over = (1 - NORM_KNEE) * Math.tanh((mag - NORM_KNEE) / (1 - NORM_KNEE));
                x = (x < 0 ? -1 : 1) * (NORM_KNEE + over);
            }
            d[i] = x;
        }
    }
    return buf;
}

function prepareSegment(from, to) {
    const buf = sliceBuffer(state.buf, from, to);
    return $("#normOn").checked ? normalizeBuffer(buf) : buf;
}

/* === 編碼與下載 === */

function encodeWav(b) {
    const channelCount = b.numberOfChannels;
    const len = b.length;
    const sampleRate = b.sampleRate;
    const channels = [];
    for (let c = 0; c < channelCount; c++) channels.push(b.getChannelData(c));

    const dataBytes = len * channelCount * 2;
    const ab = new ArrayBuffer(44 + dataBytes);
    const view = new DataView(ab);
    const writeStr = (offset, str) => {
        for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
    };

    writeStr(0, "RIFF");
    view.setUint32(4, 36 + dataBytes, true);
    writeStr(8, "WAVE");
    writeStr(12, "fmt ");
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, channelCount, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * channelCount * 2, true);
    view.setUint16(32, channelCount * 2, true);
    view.setUint16(34, 16, true);
    writeStr(36, "data");
    view.setUint32(40, dataBytes, true);

    let offset = 44;
    for (let i = 0; i < len; i++) {
        for (let c = 0; c < channelCount; c++) {
            let s = channels[c][i];
            s = s < -1 ? -1 : (s > 1 ? 1 : s);
            view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            offset += 2;
        }
    }
    return new Blob([ab], { type: "audio/wav" });
}

function encodeMp3(b, kbps) {
    const channelCount = Math.min(2, b.numberOfChannels);
    const encoder = new window.lamejs.Mp3Encoder(channelCount, b.sampleRate, kbps);
    const toInt16 = f => {
        const out = new Int16Array(f.length);
        for (let i = 0; i < f.length; i++) {
            const s = Math.max(-1, Math.min(1, f[i]));
            out[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }
        return out;
    };

    const left = toInt16(b.getChannelData(0));
    const right = channelCount > 1 ? toInt16(b.getChannelData(1)) : null;
    const blockSize = 1152;
    const parts = [];

    for (let i = 0; i < left.length; i += blockSize) {
        const l = left.subarray(i, i + blockSize);
        const chunk = right
            ? encoder.encodeBuffer(l, right.subarray(i, i + blockSize))
            : encoder.encodeBuffer(l);
        if (chunk.length) parts.push(new Int8Array(chunk));
    }
    const tail = encoder.flush();
    if (tail.length) parts.push(new Int8Array(tail));
    return new Blob(parts, { type: "audio/mpeg" });
}

function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    window.setTimeout(() => URL.revokeObjectURL(url), 4000);
}

async function exportBuffer(buf, name, quiet) {
    const fmt = currentFormat();
    if (!quiet) { setBusy(true, "編碼中…"); setProgress(0.3); await yieldToUI(); }

    let blob, ext = "wav";
    try {
        if (fmt.ext === "mp3") { blob = encodeMp3(buf, fmt.kbps); ext = "mp3"; }
        else { blob = encodeWav(buf); }
    } catch (err) {
        logLine("✗ MP3 編碼失敗（" + err.message + "），改用 WAV。");
        blob = encodeWav(buf);
        ext = "wav";
    }

    downloadBlob(blob, name + "." + ext);
    if (!quiet) setBusy(false);
    logLine("✓ " + name + "." + ext + "（" + fmtBytes(blob.size) + "）");
}

async function exportAllSegments() {
    const segs = state.segments;
    const total = segs.length;
    let done = 0;

    for (let i = 0; i < total; i++) {
        setBusy(true, "匯出第 " + (i + 1) + " / " + total + " 段…");
        setProgress(i / total);
        await yieldToUI();
        await exportBuffer(prepareSegment(segs[i].s, segs[i].e), segmentName(i), true);
        done++;
        await new Promise(resolve => window.setTimeout(resolve, DOWNLOAD_GAP_MS));
    }
    setBusy(false);

    // 筆數斷言：靜默少匯出一個檔案比報錯難發現得多
    if (done !== total) logLine("✗ 應匯出 " + total + " 段，實際只完成 " + done + " 段");
    else logLine("✓ 全部匯出完成，共 " + total + " 個檔案");
}

/* === 對照表 === */

function buildManifest() {
    const fmt = currentFormat();
    const b = state.buf;
    const pad = (s, n) => {
        s = String(s);
        while (s.length < n) s += " ";
        return s.slice(0, n);
    };

    let t = "";
    t += "錄音切割台 " + VERSION + " · 分段對照表\n" + "=".repeat(64) + "\n";
    t += "原始檔案：" + state.name + "\n";
    t += "原始長度：" + fmtTime(b.duration) + "\n";
    t += "切割時間：" + new Date().toLocaleString("zh-TW") + "\n";
    t += "輸出格式：" + (fmt.ext === "mp3" ? "MP3 " + fmt.kbps + " kbps" : "WAV 16-bit") +
        " / " + b.sampleRate + " Hz / " +
        (b.numberOfChannels === 1 ? "單聲道" : b.numberOfChannels + " 聲道") + "\n";
    t += "音量正規化：" + ($("#normOn").checked ? "開" : "關") + "\n\n";

    t += pad("段號", 6) + pad("檔名", 30) + pad("原始起點", 12) +
         pad("原始迄點", 12) + pad("長度", 9) + "切點\n";
    t += "-".repeat(78) + "\n";
    state.segments.forEach((seg, i) => {
        const kind = seg.align === "hard" ? "⚠ 硬切（可能切到句子）"
            : seg.align === "marker" ? "人工標記"
            : seg.align === "manual" ? "人工指定"
            : seg.align === "end" ? "結尾" : "停頓對齊";
        t += pad(String(i + 1).padStart(2, "0"), 6) +
             pad(segmentName(i) + "." + fmt.ext, 30) +
             pad(fmtTime(seg.s), 12) + pad(fmtTime(seg.e), 12) +
             pad(fmtShort(seg.e - seg.s), 9) + kind + "\n";
    });

    t += "\n【回推整場錄音的時間】\n";
    t += "逐字稿上的時間 + 該段「原始起點」= 整場錄音的絕對時間。\n";
    if (state.segments.length > 1) {
        t += "例：第 02 段逐字稿寫 03:20 → 實際位置是 " +
             fmtTime(state.segments[1].s) + " 再加 03:20\n";
    }

    t += "\n【上傳方式】\n";
    t += "在同一個 Gemini 對話裡，一次只附一個音檔，做完再附下一個。\n";
    t += "這樣 Gemini 會記得前面出現過的人名和術語，前後用詞才會一致；\n";
    t += "一次全部丟進去不但慢，回覆也容易被截斷。\n";
    t += "第一次上傳時，把下面整段提示詞連同第 01 個檔一起送出；\n";
    t += "之後每次只要附下一個檔，並說「這是第 N 段」即可。\n";

    t += "\n" + "=".repeat(64) + "\n";
    t += "【給 Gemini 的提示詞 — 從下一行開始整段複製貼上】\n" + "=".repeat(64) + "\n\n";
    t += "這是一場多專科團隊會議（MDT）的錄音，已切成 " + state.segments.length + " 個檔案，\n";
    t += "檔名的編號就是時間順序。我會在這個對話裡一次附一個檔，請依序處理。\n\n";
    t += "請幫我做逐字稿，規則如下：\n";
    t += "1. 完整逐字記錄，不要摘要、不要潤飾、不要把口語改成書面語。\n";
    t += "2. 醫學術語、藥名、檢查名稱若是用英文講的，就照英文原樣記錄，不要翻譯。\n";
    t += "3. 換人發言時另起一行。能從稱謂判斷身分就寫稱謂（如「主任：」「個管師：」），\n";
    t += "   判斷不出來就用「發言者A：」「發言者B：」並全程保持一致。\n";
    t += "4. 聽不清楚的地方標 [聽不清]，不要猜。劑量、期別、日期這類數字若不確定，\n";
    t += "   一律標 [?]，絕對不要填入看起來合理的數值。\n";
    t += "5. 每約一分鐘標一次時間戳，格式 [mm:ss]，以「這個檔案」的開頭為 00:00。\n";
    t += "6. 病人姓名一律用 ○○○ 遮蔽，不要寫出全名。\n";
    t += "7. 每段都是從整場錄音切出來的，開頭有可能從句子中間開始 ——\n";
    t += "   那是正常的，照實記錄就好，不要自行補齊前半句。\n\n";
    t += "做完這一段就停下來，等我附下一個檔，不要主動往下推測。\n";
    t += "\n（第 6 條若不需要遮蔽，自行刪掉再貼）\n";

    // BOM：Windows 記事本開 UTF-8 無 BOM 的中文會變亂碼
    downloadBlob(new Blob(["\ufeff" + t], { type: "text/plain;charset=utf-8" }),
        $("#prefix").value + "_對照表.txt");
    logLine("✓ 已下載對照表");
}

/* === 事件委派 === */
// 動態產生的按鈕不用 inline onclick（坑 #74：名稱打錯只會靜默失效、
// 而且死碼會讓下次接手的人誤判功能存在）。全部走 data-action 查表分派。

const CLICK_ACTIONS = {
    "pick-file": () => $("#file").click(),
    "reset": resetToLoader,

    "play-toggle": () => { player.paused ? startPlay() : stopPlay(); },
    "play-rewind": () => { stopPlay(); seekTo(0); },
    "play-selection": () => { if (state.selStart !== null) startPlay(state.selStart, state.selEnd); },

    "zoom-in": () => zoomView(0.5),
    "zoom-out": () => zoomView(2),
    "zoom-fit": () => { fitView(); redraw(); },
    "zoom-selection": () => {
        if (state.selStart === null) return;
        state.viewStart = state.selStart - (state.selEnd - state.selStart) * 0.1;
        state.viewDur = (state.selEnd - state.selStart) * 1.2;
        clampView();
        redraw();
    },

    "plan-auto": planAuto,
    "preset": el => {
        $("#segMin").value = el.dataset.min;
        $("#segSec").value = 0;
        $("#plan").value = el.dataset.plan;
        renderCompatibility();
    },

    "mark-here": () => addMarker(playhead()),
    "clear-marks": () => {
        // 清空手動標記是破壞性操作，可能是聽了整場才標出來的
        if (state.markers.length && !window.confirm(
            "要清除全部 " + state.markers.length + " 個切點嗎？")) return;
        state.markers = [];
        planFromMarkers();
        updateMarkerUI();
    },
    "seg-remove-cut": el => {
        // 移除某段的起始切點 = 把它併回前一段
        removeMarker(state.segments[Number(el.dataset.idx)].s);
    },

    "seg-audition": el => {
        const seg = state.segments[Number(el.dataset.idx)];
        centerView(seg.s, 40);
        startPlay(seg.s, seg.s + 8);
    },
    "seg-export": el => {
        const i = Number(el.dataset.idx);
        const seg = state.segments[i];
        exportBuffer(prepareSegment(seg.s, seg.e), segmentName(i));
    },

    "export-all": exportAllSegments,
    "export-manifest": buildManifest,

    "set-sel-start": () => {
        const t = playhead();
        const end = (state.selEnd !== null && state.selEnd > t)
            ? state.selEnd : Math.min(state.buf.duration, t + 1);
        setSelection(t, end);
    },
    "set-sel-end": () => {
        const t = playhead();
        const start = (state.selStart !== null && state.selStart < t)
            ? state.selStart : Math.max(0, t - 1);
        setSelection(start, t);
    },
    "clear-selection": clearSelection
};

const CHANGE_ACTIONS = {
    "rate": applyPlaybackRate,
    "seg-mode": el => switchSegMode(el.value),
    "threshold": () => {
        $("#thrV").textContent = $("#thr").value + " dB";
        state.skipKey = "";   // 門檻變了，跳過安靜段的清單要重算
    },
    "trim-ends": () => {
        if (state.segMode === "multi") planFromMarkers();
    },
    "refresh-names": () => {
        renderSegments();
        renderCompatibility();
    },
    "sel-time": () => {
        if (!state.buf) return;
        const a = clampTime(readTimeGroup("a"));
        const b = clampTime(readTimeGroup("b"));
        setSelection(Math.min(a, b), Math.max(a, b));
    },
    "seg-label": el => {
        const i = Number(el.dataset.idx);
        state.segments[i].label = el.value;
        const row = el.closest("tr");
        const full = segmentName(i) + "." + currentFormat().ext;
        row.children[2].textContent = full;
        row.children[2].title = full;
    }
};

// 動態產生的節點不在啟動時的 DOM 裡，列在這裡才能一起驗證
const DYNAMIC_ACTIONS = ["seg-audition", "seg-export", "seg-remove-cut", "seg-label"];

// 生成後配驗證：data-action 是純字串，打錯不會有任何建置期警告
function assertActionsBound() {
    const declared = new Set(DYNAMIC_ACTIONS);
    $$("[data-action]").forEach(el => declared.add(el.dataset.action));
    $$("[data-change]").forEach(el => declared.add(el.dataset.change));
    const missing = Array.from(declared)
        .filter(name => !CLICK_ACTIONS[name] && !CHANGE_ACTIONS[name]);
    if (missing.length) logLine("✗ 未綁定的動作：" + missing.join("、"));
    return missing.length === 0;
}

function bindDelegation() {
    document.addEventListener("click", ev => {
        const el = ev.target.closest("[data-action]");
        if (!el) return;
        const fn = CLICK_ACTIONS[el.dataset.action];
        if (!fn) { logLine("✗ 未綁定的動作：" + el.dataset.action); return; }
        fn(el, ev);
    });

    ["change", "input"].forEach(type => {
        document.addEventListener(type, ev => {
            const el = ev.target.closest("[data-change]");
            if (!el) return;
            // range 與文字欄要即時反應用 input，其餘用 change，
            // 避免每敲一個字就重算整張表
            const wantsInput = el.type === "range" || el.type === "text";
            if ((type === "input") !== wantsInput) return;
            const fn = CHANGE_ACTIONS[el.dataset.change];
            if (fn) fn(el, ev);
        });
    });
}

/* === 滑鼠與鍵盤 === */

let isDragging = false;
let dragOrigin = 0;
let dragMoved = false;

function bindPointer() {
    cvWave.addEventListener("mousedown", ev => {
        isDragging = true;
        dragMoved = false;
        dragOrigin = clampTime(xToTime(ev.offsetX, cvWave.getBoundingClientRect().width));
    });
    cvWave.addEventListener("mousemove", ev => {
        if (!isDragging) return;
        const rect = cvWave.getBoundingClientRect();
        const t = clampTime(xToTime(ev.clientX - rect.left, rect.width));
        if (Math.abs(t - dragOrigin) > state.viewDur * 0.004) dragMoved = true;
        if (dragMoved) setSelection(Math.min(dragOrigin, t), Math.max(dragOrigin, t));
    });
    cvWave.addEventListener("wheel", ev => {
        ev.preventDefault();
        zoomView(ev.deltaY > 0 ? 1.25 : 0.8,
            xToTime(ev.offsetX, cvWave.getBoundingClientRect().width));
    }, { passive: false });

    let overviewDragging = false;
    const jumpFromOverview = ev => {
        const rect = cvOverview.getBoundingClientRect();
        state.viewStart = (ev.clientX - rect.left) / rect.width * state.buf.duration
            - state.viewDur / 2;
        clampView();
        redraw();
    };
    cvOverview.addEventListener("mousedown", ev => { overviewDragging = true; jumpFromOverview(ev); });

    window.addEventListener("mousemove", ev => { if (overviewDragging) jumpFromOverview(ev); });
    window.addEventListener("mouseup", () => {
        overviewDragging = false;
        if (!isDragging) return;
        isDragging = false;
        if (!dragMoved) seekTo(dragOrigin);
    });
}

function bindKeyboard() {
    document.addEventListener("keydown", ev => {
        if (/INPUT|SELECT|TEXTAREA/.test(ev.target.tagName) || !state.buf) return;
        if (ev.code === "Space") { ev.preventDefault(); player.paused ? startPlay() : stopPlay(); }
        else if (ev.code === "ArrowLeft") { ev.preventDefault(); seekTo(playhead() - 3); }
        else if (ev.code === "ArrowRight") { ev.preventDefault(); seekTo(playhead() + 3); }
        else if (ev.key === "m" || ev.key === "M") { addMarker(playhead()); }
        else if (ev.key === "[") { CLICK_ACTIONS["set-sel-start"](); }
        else if (ev.key === "]") { CLICK_ACTIONS["set-sel-end"](); }
        else if (ev.code === "Escape") { clearSelection(); }
    });
}

function bindFileInput() {
    $("#file").addEventListener("change", ev => {
        if (ev.target.files[0]) loadFile(ev.target.files[0]);
    });
    const drop = $("#drop");
    ["dragenter", "dragover"].forEach(type => drop.addEventListener(type, ev => {
        ev.preventDefault();
        drop.classList.add("hot");
    }));
    ["dragleave", "drop"].forEach(type => drop.addEventListener(type, ev => {
        ev.preventDefault();
        drop.classList.remove("hot");
    }));
    drop.addEventListener("drop", ev => {
        if (ev.dataTransfer.files[0]) loadFile(ev.dataTransfer.files[0]);
    });
}

function resetToLoader() {
    stopPlay();
    $("#work").classList.add("hide");
    $("#loader").classList.remove("hide");
    $("#btnNew").classList.add("hide");
    state.buf = null;
    state.frames = null;
    state.markers = [];
    state.segments = [];
}

/* === 啟動 === */

function disableMp3IfUnavailable() {
    if (window.lamejs) return;
    const sel = $("#fmt");
    Array.from(sel.querySelectorAll('option[value^="mp3"]')).forEach(opt => {
        opt.disabled = true;
        opt.textContent = opt.textContent.replace(/^MP3/, "MP3（離線不可用）");
    });
    sel.value = "wav";
}

function init() {
    applyBranding();
    bindDelegation();
    bindPointer();
    bindKeyboard();
    bindFileInput();
    player.addEventListener("ended", stopPlay);
    window.addEventListener("resize", () => {
        state.waveCache.key = "";
        state.overviewCache.key = "";
        if (state.buf) redraw();
    });
    disableMp3IfUnavailable();
    assertActionsBound();
}

if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
} else {
    init();
}

})();
</script>
